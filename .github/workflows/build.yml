name: Build MiLoro multi-OS

# Dispara en 2 casos:
# 1. Push de tag `v*.*.*` (release oficial automática)
# 2. Trigger manual desde GitHub Actions UI (workflow_dispatch)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ej. 0.0.9) — solo etiqueta, NO bumpea archivos'
        required: true
        default: '0.0.9'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04   # Linux: AppImage + .deb + .rpm
          - windows-latest # Win: .msi + .exe NSIS
          - macos-14       # macOS: .dmg + .app.tar.gz (Apple Silicon)
          - macos-13       # macOS: .dmg + .app.tar.gz (Intel x86_64)
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Rust toolchain (stable). Cache automático para builds rápidos ---
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      # --- Node.js + npm deps frontend Svelte ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'

      # --- Deps sistema (cmake, clang, libwhisper compile, GTK/WebKit, etc.) ---
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            cmake \
            build-essential \
            clang \
            libclang-dev \
            libxdo-dev

      - name: Install Windows deps (cmake via choco)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install -y cmake llvm
        shell: pwsh

      - name: Install macOS deps (cmake)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install cmake
          # llvm/clang ya viene con Xcode Command Line Tools

      # --- npm install + frontend build ---
      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      # --- Tauri build (Rust compile + bundle + sign si hay key) ---
      - name: Build Tauri
        working-directory: desktop
        env:
          # Tauri updater signing — secrets configurados en GitHub repo settings:
          # Settings → Secrets and variables → Actions → "New repository secret"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      # --- Upload artefactos por OS para descarga en GitHub release ---
      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: miloro-linux-x86_64
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: miloro-windows-x86_64
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.sig
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: miloro-${{ matrix.platform == 'macos-14' && 'macos-aarch64' || 'macos-x86_64' }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

  # --- Job final: cuando los 4 builds OK, crear GitHub Release con todos los artefactos ---
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Show downloaded files
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # 0.1.0-beta = prerelease
