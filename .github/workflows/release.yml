# MiLoro — Build cross-platform + Release a GitHub
#
# Disparador: push de tag tipo v0.0.1, v0.1.0, etc.
#
# Outputs por SO:
#   - Linux: .AppImage + .deb + .rpm
#   - Windows: .msi + .exe
#   - macOS: .dmg (universal Intel+ARM) + .app.tar.gz
#
# Para que funcione necesitas configurar en Settings → Secrets:
#   TAURI_SIGNING_PRIVATE_KEY        — privada generada con `npx tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password de la key
#   (futuro, cuando notarización macOS):
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#
# La pública (que va embebida en tauri.conf.json) puede commitearse al repo.

name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:   # permite lanzar manual desde Actions tab

jobs:
  release:
    permissions:
      contents: write   # necesario para crear/actualizar GitHub Releases
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"   # Intel + Apple Silicon (universal binary)
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"   # Linux x86_64
            args: ""
          - platform: "windows-latest" # Windows x86_64
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install npm deps
        run: npm ci

      - name: Build + bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # (futuro macOS notarización)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MiLoro ${{ github.ref_name }}"
          releaseBody: |
            ## MiLoro ${{ github.ref_name }}

            Dictado por voz local — multiplataforma.

            ### Descarga según tu SO
            - **Linux**: `.AppImage` (portable) o `.deb` (Ubuntu/Debian)
            - **Windows**: `.msi`
            - **macOS**: `.dmg` (universal Intel+ARM)

            Ver https://miloro.app para detalles + FAQ.

            ### Cambios
            (autogenerado por workflow — completar manualmente si quieres release notes detallados)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
